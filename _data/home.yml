intro:
  - "I am a Ph.D. candidate in Systems Engineering at the City University of Hong Kong. My research focuses on intelligent infrastructure monitoring and non-destructive pavement damage detection."
  - "I work on computer vision and vision-language models for pavement damage detection, crack segmentation, and structural health monitoring. I have published 12 journal articles and 3 conference papers in venues including Computer-Aided Civil and Infrastructure Engineering, Automation in Construction, and IEEE Transactions on Intelligent Transportation Systems."

